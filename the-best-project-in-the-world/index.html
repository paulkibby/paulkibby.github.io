<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The best project in the world</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
    * {
      box-sizing: border-box;
      padding: 0;
      margin: 0;
    }
    body {
      font-family: "Roboto", sans-serif;
      font-optical-sizing: auto;
      font-weight: 400;
      font-style: normal;
      font-variation-settings: "wdth" 100;
    }
    div.t {
      padding: 24px;
      font-size: 18px;
      line-height: 1.3;
      border-radius: 1rem;
      border: 1px solid rgb(255 255 255 / 10%);
      background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.07) 0%,
          rgba(255, 255, 255, 0.02) 100%
      );
      margin-bottom: 16px;
    }
  </style>
</head>
<body style="background: black; color: white;">
  <div style="width: 100%; max-width: 640px; padding: 24px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">
    <div class="t">
      Доброе утро, добрый вечер, добрый день, здравствуйте
    </div>
    <div class="t">
      Сегодня немного не 15 августа
    </div>
    <div class="t">
      Всего доброго, до свидания
    </div>
  </div>
</body>
</html>
